services:
  back:
    build: ./back
    ports:
      - "5010:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - ConnectionStrings__DefaultConnection=Data Source=/app/db/room-booking.db
    volumes:
      - db-data:/app/db
    restart: unless-stopped

  front:
    build:
      context: ./front
      args:
        VITE_ROOM_BOOKING_API: ${VITE_ROOM_BOOKING_API:-http://localhost:5010}
    ports:
      - "5173:80"
    depends_on:
      - back
    restart: unless-stopped

volumes:
  db-data:
